name: CD — Render V2 Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy without CI (use only in emergencies)'
        required: false
        default: 'false'
      target:
        description: "Service zum Deployen"
        required: true
        type: choice
        default: both
        options:
          - backend
          - frontend
          - both

jobs:
  deploy:
    name: Trigger Render V2 Deploy Hook
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true')
    steps:
      - name: Validate secrets are set
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] || [ "${{ inputs.target }}" != "frontend" ]; then
            if [ -z "${{ secrets.RENDER_V2_DEPLOY_HOOK_BACKEND }}" ]; then
              echo "::error::Secret RENDER_V2_DEPLOY_HOOK_BACKEND nicht gesetzt (Settings → Secrets → Actions)."
              exit 1
            fi
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ] || [ "${{ inputs.target }}" != "backend" ]; then
            if [ -z "${{ secrets.RENDER_V2_DEPLOY_HOOK_FRONTEND }}" ]; then
              echo "::error::Secret RENDER_V2_DEPLOY_HOOK_FRONTEND nicht gesetzt (Settings → Secrets → Actions)."
              exit 1
            fi
          fi

      - name: Trigger backend deploy
        if: >
          github.event_name == 'workflow_run' ||
          inputs.target == 'backend' ||
          inputs.target == 'both'
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.RENDER_V2_DEPLOY_HOOK_BACKEND }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Backend Deploy Hook Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ] && [ "$status" != "201" ] && [ "$status" != "202" ]; then
            echo "::error::Render-Deploy-Hook failed (Backend)"
            exit 1
          fi

      - name: Trigger frontend deploy
        if: >
          github.event_name == 'workflow_run' ||
          inputs.target == 'frontend' ||
          inputs.target == 'both'
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.RENDER_V2_DEPLOY_HOOK_FRONTEND }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Frontend Deploy Hook Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ] && [ "$status" != "201" ] && [ "$status" != "202" ]; then
            echo "::error::Render-Deploy-Hook failed (Frontend)"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### PRISMA V2 Deploy Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Target: \`${{ inputs.target || 'both (auto push)' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`${{ github.event_name }}\` (CI: ${{ github.event.workflow_run.conclusion || 'n/a' }}) by ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Render baut das Image — Status im [Render-Dashboard](https://dashboard.render.com) sichtbar." >> $GITHUB_STEP_SUMMARY
