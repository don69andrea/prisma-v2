name: CD — Render Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Service zum Deployen"
        required: true
        type: choice
        default: backend
        options:
          - backend
          - frontend
          - both

jobs:
  deploy:
    name: Trigger Render Deploy Hook
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret is set
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ] && [ "${{ inputs.target }}" != "frontend" ]; then
            echo "::error::Secret RENDER_DEPLOY_HOOK_BACKEND ist nicht gesetzt (Settings → Secrets → Actions)."
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ] && [ "${{ inputs.target }}" != "backend" ]; then
            echo "::error::Secret RENDER_DEPLOY_HOOK_FRONTEND ist nicht gesetzt (Settings → Secrets → Actions)."
            exit 1
          fi

      - name: Trigger backend deploy
        if: inputs.target == 'backend' || inputs.target == 'both'
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Backend Deploy Hook Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ] && [ "$status" != "201" ] && [ "$status" != "202" ]; then
            echo "::error::Render-Deploy-Hook failed (Backend)"
            exit 1
          fi

      - name: Trigger frontend deploy
        if: inputs.target == 'frontend' || inputs.target == 'both'
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Frontend Deploy Hook Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ] && [ "$status" != "201" ] && [ "$status" != "202" ]; then
            echo "::error::Render-Deploy-Hook failed (Frontend)"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Deploy Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Target: \`${{ inputs.target }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`workflow_dispatch\` by ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Render baut das Image — Status im Render-Dashboard sichtbar." >> $GITHUB_STEP_SUMMARY
