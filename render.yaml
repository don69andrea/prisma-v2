databases:
  - name: prisma-db
    databaseName: prisma
    user: prisma
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: prisma-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    # Dockerfile CMD calls /app/backend-start.sh which runs alembic +
    # uvicorn. No dockerCommand override needed — Render uses the CMD.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      # Admin-API-Key (X-API-Key-Header) für /admin-Endpoints.
      # Production-Validator in backend/config.py:71 erzwingt einen Wert —
      # ohne diesen bricht der Container-Boot mit ValidationError ab.
      # sync: false → manuell im Dashboard setzen (openssl rand -hex 32).
      - key: API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHONPATH
        value: /app

  - type: web
    name: prisma-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    autoDeploy: true
    envVars:
      # Render's fromService.property: host liefert nur den Hostname ohne
      # Scheme — der Client-Code braucht aber eine voll-qualifizierte URL
      # (sonst interpretiert der Browser den Wert als relativen Pfad und
      # bekommt 404). Deshalb hardcoded auf den bekannten Backend-Host.
      - key: NEXT_PUBLIC_API_URL
        value: https://prisma-backend-7ai7.onrender.com
    buildFilter:
      paths:
        - frontend/**
        - Dockerfile.frontend
        - render.yaml
