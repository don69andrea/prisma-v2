databases:
  - name: prisma-v2-db
    databaseName: prisma_v2
    user: prisma_v2
    plan: free
    postgresMajorVersion: "16"
    # pgvector wird automatisch via Alembic-Migration 0008 aktiviert (CREATE EXTENSION IF NOT EXISTS vector).
    # Kein manueller Schritt nötig — Migration läuft beim ersten Deploy über backend-start.sh.

services:
  - type: web
    name: prisma-v2-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    branch: main
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    # Dockerfile CMD calls /app/backend-start.sh which runs alembic + uvicorn.
    buildFilter:
      paths:
        - backend/**
        - alembic.ini
        - pyproject.toml
        - uv.lock
        - Dockerfile.backend
        - scripts/backend-start.sh
        - scripts/seed_admin.py
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      # Admin-API-Key (X-API-Key-Header) für /admin-Endpoints.
      # sync: false → manuell im Dashboard setzen (openssl rand -hex 32).
      - key: API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://prisma-v2-frontend.onrender.com
      - key: PYTHONPATH
        value: /app
      # Alert Engine: E-Mail-Benachrichtigungen via SendGrid
      - key: SENDGRID_API_KEY
        sync: false
      # VoyageAI Embedding-Key
      - key: VOYAGE_API_KEY
        sync: false
      # MCP-Tool-API-Key für X-API-Key auf /api/v1/runs (getrennt vom Admin-Key)
      - key: TOOL_API_KEY
        sync: false
      # App-Version — wird von /health zurückgegeben
      - key: APP_VERSION
        value: "2.1.0"
      # JWT auth — openssl rand -hex 32 im Render-Dashboard setzen
      - key: JWT_SECRET
        sync: false
      # Admin-User wird beim Start automatisch via seed_admin.py erstellt
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Twelve Data API — Live-Kurse ohne yfinance-Block (kostenlos: 800 calls/Tag)
      # https://twelvedata.com/register — Key im Render-Dashboard setzen
      - key: TWELVE_DATA_API_KEY
        sync: false

  - type: web
    name: prisma-v2-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    branch: main
    plan: free
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # NEXT_PUBLIC_* variables are baked into the Next.js bundle at build time.
      # Render passes envVars as both build-time ARGs and runtime env vars for
      # Docker services, so setting it here is sufficient.
      - key: NEXT_PUBLIC_API_URL
        value: https://prisma-v2-backend.onrender.com
      # Muss identisch mit API_KEY im Backend sein — manuell im Dashboard setzen.
      - key: NEXT_PUBLIC_API_KEY
        sync: false
    buildFilter:
      paths:
        - frontend/**
        - Dockerfile.frontend
        - render.yaml

  - type: cron
    name: prisma-news-ingestion
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    branch: main
    plan: free
    schedule: "0 6 * * *"
    dockerCommand: python -m backend.application.services.news_ingestion_service
    buildFilter:
      paths:
        - backend/**
        - alembic.ini
        - pyproject.toml
        - uv.lock
        - Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false

  - type: cron
    name: prisma-crypto-daily
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    branch: main
    plan: free
    schedule: "30 6 * * *"
    dockerCommand: python -m backend.scripts.crypto_daily_snapshot
    buildFilter:
      paths:
        - backend/**
        - alembic.ini
        - pyproject.toml
        - uv.lock
        - Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false

  - type: cron
    name: prisma-smi-market-caps
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    branch: main
    plan: free
    schedule: "0 5 * * *"
    dockerCommand: python scripts/update_smi_market_caps.py
    buildFilter:
      paths:
        - backend/**
        - alembic.ini
        - pyproject.toml
        - uv.lock
        - Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString

  - type: cron
    name: prisma-stock-daily
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    branch: main
    plan: free
    schedule: "0 7 * * *"
    dockerCommand: python -m backend.scripts.stock_daily_snapshot
    buildFilter:
      paths:
        - backend/**
        - alembic.ini
        - pyproject.toml
        - uv.lock
        - Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

