name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    name: Build Docker Images & GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="${GITHUB_REF#refs/tags/}"
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ steps.tags.outputs.owner_lc }}/prisma-backend:${{ steps.tags.outputs.version }}
            ghcr.io/${{ steps.tags.outputs.owner_lc }}/prisma-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ steps.tags.outputs.owner_lc }}/prisma-frontend:${{ steps.tags.outputs.version }}
            ghcr.io/${{ steps.tags.outputs.owner_lc }}/prisma-frontend:latest

      - name: Generate GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.version }}
          name: ${{ steps.tags.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Images

            ```
            docker pull ghcr.io/${{ steps.tags.outputs.owner_lc }}/prisma-backend:${{ steps.tags.outputs.version }}
            docker pull ghcr.io/${{ steps.tags.outputs.owner_lc }}/prisma-frontend:${{ steps.tags.outputs.version }}
            ```

            ## Was ist neu?

            Siehe automatisch generierte Notes unten.
