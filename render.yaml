databases:
  - name: prisma-v2-db
    databaseName: prisma_v2
    user: prisma_v2
    plan: free
    postgresMajorVersion: "16"
    # pgvector extension must be enabled after first deploy: CREATE EXTENSION vector;

services:
  - type: web
    name: prisma-v2-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    # Dockerfile CMD calls /app/backend-start.sh which runs alembic + uvicorn.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      # Admin-API-Key (X-API-Key-Header) für /admin-Endpoints.
      # sync: false → manuell im Dashboard setzen (openssl rand -hex 32).
      - key: API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHONPATH
        value: /app
      # Alert Engine: E-Mail-Benachrichtigungen via SendGrid
      - key: SENDGRID_API_KEY
        sync: false
      # VoyageAI Embedding-Key
      - key: VOYAGE_API_KEY
        sync: false
      # App-Version — wird von /health zurückgegeben
      - key: APP_VERSION
        value: "2.0.0"

  - type: web
    name: prisma-v2-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    buildFilter:
      paths:
        - frontend/**
        - Dockerfile.frontend
        - render.yaml
