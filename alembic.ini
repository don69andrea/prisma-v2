# Alembic configuration file
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file
script_location = backend/alembic

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of the revision file slug
truncate_slug_length = 40

# The database URL is set programmatically in env.py via pydantic-settings
# so this line acts only as a fallback / documentation reference.
sqlalchemy.url = postgresql+asyncpg://prisma:prisma@db:5432/prisma

[post_write_hooks]
# Optionally run ruff after generating a new migration
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
