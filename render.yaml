databases:
  - name: prisma-v2-db
    databaseName: prisma_v2
    user: prisma_v2
    plan: free
    postgresMajorVersion: "16"
    # pgvector extension must be enabled after first deploy: CREATE EXTENSION vector;

services:
  - type: web
    name: prisma-v2-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    # Dockerfile CMD calls /app/backend-start.sh which runs alembic + uvicorn.
    buildFilter:
      paths:
        - backend/**
        - alembic.ini
        - pyproject.toml
        - uv.lock
        - Dockerfile.backend
        - scripts/backend-start.sh
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-v2-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      # Admin-API-Key (X-API-Key-Header) für /admin-Endpoints.
      # sync: false → manuell im Dashboard setzen (openssl rand -hex 32).
      - key: API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://prisma-v2-frontend.onrender.com
      - key: PYTHONPATH
        value: /app
      # Alert Engine: E-Mail-Benachrichtigungen via SendGrid
      - key: SENDGRID_API_KEY
        sync: false
      # VoyageAI Embedding-Key
      - key: VOYAGE_API_KEY
        sync: false
      # MCP-Tool-API-Key für X-API-Key auf /api/v1/runs (getrennt vom Admin-Key)
      - key: TOOL_API_KEY
        sync: false
      # App-Version — wird von /health zurückgegeben
      - key: APP_VERSION
        value: "2.0.0"

  - type: web
    name: prisma-v2-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    branch: main
    autoDeploy: true
    envVars:
      # NEXT_PUBLIC_* variables are baked into the Next.js bundle at build time.
      # Render passes envVars as both build-time ARGs and runtime env vars for
      # Docker services, so setting it here is sufficient.
      - key: NEXT_PUBLIC_API_URL
        value: https://prisma-v2-backend.onrender.com
      # Muss identisch mit API_KEY im Backend sein — manuell im Dashboard setzen.
      - key: NEXT_PUBLIC_API_KEY
        sync: false
    buildFilter:
      paths:
        - frontend/**
        - Dockerfile.frontend
        - render.yaml
