name: Daily Data Seed

on:
  schedule:
    # GitHub Actions IPs werden von Yahoo Finance nicht geblockt (im Gegensatz zu Render)
    - cron: "0 5 * * 1-5"   # SMI Market Caps — Mo-Fr 05:00 UTC
    - cron: "0 6 * * 1-5"   # News Ingestion  — Mo-Fr 06:00 UTC
    - cron: "30 6 * * 1-5"  # Crypto Daily    — Mo-Fr 06:30 UTC
    - cron: "0 7 * * 1-5"   # Stock Signals   — Mo-Fr 07:00 UTC
  workflow_dispatch:
    inputs:
      job:
        description: "Welcher Job?"
        required: true
        default: "stock-daily"
        type: choice
        options:
          - stock-daily
          - crypto-daily
          - news-ingestion
          - smi-market-caps
          - all

env:
  DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
  ENVIRONMENT: production
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  smi-market-caps:
    name: SMI Market Caps
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'smi-market-caps' || inputs.job == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Run SMI Market Caps Update
        run: uv run python scripts/update_smi_market_caps.py

  news-ingestion:
    name: News Ingestion
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'news-ingestion' || inputs.job == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Run News Ingestion
        run: uv run python -m backend.application.services.news_ingestion_service

  crypto-daily:
    name: Crypto Daily Snapshot
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 6 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'crypto-daily' || inputs.job == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Run Crypto Daily Snapshot
        run: uv run python -m backend.scripts.crypto_daily_snapshot
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

  stock-daily:
    name: Stock Daily Snapshot (SMI-20)
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'stock-daily' || inputs.job == 'all'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Run Stock Daily Snapshot
        run: uv run python -m backend.scripts.stock_daily_snapshot
