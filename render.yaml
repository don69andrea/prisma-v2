databases:
  - name: prisma-db
    databaseName: prisma
    user: prisma
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: prisma-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prisma-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: prisma-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    buildFilter:
      paths:
        - frontend/**
        - Dockerfile.frontend
        - render.yaml
